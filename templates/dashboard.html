{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            let token = urlParams.get("token") || localStorage.getItem("access_token");

            if (!token) {
                console.error("No access token found. Redirecting to login.");
                window.location.href = "/login";
                return;
            }

            let userData = localStorage.getItem("user_data");

            if (!userData) {
                console.log("Fetching user data from API...");
                try {
                    const response = await fetch("/api/user-info/", {
                        headers: { "Authorization": `Bearer ${token}` },
                    });

                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

                    userData = await response.json();
                    localStorage.setItem("user_data", JSON.stringify(userData));
                } catch (error) {
                    console.error("Failed to fetch user data:", error);
                    window.location.href = "/login";
                    return;
                }
            } else {
                userData = JSON.parse(userData);
            }

            // Update UI with user data
            document.getElementById("welcome").textContent = `Welcome, ${userData.name}!`;
            document.getElementById("user-id").textContent = `User ID: ${userData.id}`;
        });
    </script>
</head>
<body>
    <nav class="top">
        <div class="topbox toplink">
            <a>Trois-Rivières User</a>
            <div class="dropdown">
                <button class="dropbtn">View</button>
                <div class="dropdown-content">
                  <a href="{% url 'basicuser' %}">Profile</a>
                  <a href="{% url 'microsoft-logout' %}">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <section class="title">
            <div class="container">
                <div class="row">
                    <h1 id="welcome">Welcome to the Dashboard!</h1>
                    <h2 id="user-id">User ID: Loading...</h2>
                </div>
            </div>
        </section>
    </main>

    {% if messages %}
    <div id="message-popup" class="popup">
        {% for message in messages %}
            <p class="{{ message.tags }}">{{ message }}</p>
        {% endfor %}
    </div>

    <script>
        // Automatically close the popup after 3 seconds
        setTimeout(function () {
            document.getElementById("message-popup").style.display = "none";
        }, 3000);
    </script>

    <style>
        .popup {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: green;
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% endif %}
</body>
</html>
